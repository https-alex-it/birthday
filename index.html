<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Invito al 12° Compleanno di Asia</title>

<link rel="stylesheet" href="https://unpkg.com/bulma@0.8.0/css/bulma.min.css">
<script src="https://kit.fontawesome.com/2828f7885a.js" crossorigin="anonymous"></script>

<style>
body{
font-family:"Segoe UI",sans-serif;
margin:0;
}

.hero{
background:linear-gradient(135deg,#ff9ad5,#ffc6e3);
color:white;
}

.hero h1,.hero h2,.hero h4{
color:white;
}

.section-title{
color:#ff4fa3;
font-weight:700;
}

.countdown{
font-size:32px;
font-weight:700;
margin-top:20px;
}

.button{
border-radius:30px;
}

.map-container{
position:relative;
width:100%;
max-width:900px;
margin:auto;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.map-container iframe{
width:100%;
height:450px;
border:0;
}

.floating-whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px 20px;
border-radius:40px;
font-size:18px;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
text-decoration:none;
z-index:999;
}

.floating-whatsapp:hover{
background:#1ebe5d;
color:white;
}
</style>
</head>

<body>

<section class="hero is-large">
<div class="hero-body has-text-centered">

<h1 class="subtitle">Sei invitato al</h1>
<h2 class="title">12° Compleanno di Asia</h2>

<h4 class="subtitle">
Lunedì 16 Marzo 2026<br>
Bar Avenue Caffè<br>
Via Viale Crocci 229<br>
Valderice (TP)
</h4>

<div class="countdown" id="countdown">
Caricamento countdown...
</div>

</div>
</section>

<section class="section">
<div class="container">

<h1 class="title has-text-centered section-title">
Dove si terrà
</h1>

<p class="has-text-centered mb-5">
<strong>Bar Avenue Caffè</strong><br>
Via Viale Crocci, 229<br>
91019 Valderice TP
</p>

<div class="map-container">
<iframe
src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3143.3411611842034!2d12.627684499999999!3d38.015825299999996!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x13197d3abf70ebb1%3A0xcc3b3504f28d536d!2sAvenue%20Cafe'%20Srls!5e0!3m2!1sit!2sit!4v1773064650601!5m2!1sit!2sit"
loading="lazy"
allowfullscreen="">
</iframe>
</div>

<div class="has-text-centered mt-5">
<a href="https://maps.app.goo.gl/tQyFrwRxDLyVeocR7"
class="button is-link is-medium">
<i class="fas fa-map-marker-alt"></i>
&nbsp;Apri su Google Maps
</a>
</div>

</div>
</section>

<section class="section has-background-light">
<div class="container has-text-centered">

<h1 class="title section-title">
Parteciperai?
</h1>

<p>Facci sapere se ci sarai!</p>

<div class="buttons is-centered mt-5">

<button class="button is-success is-medium" id="btnSi">
✅ Sì, ci sarò
</button>

<button class="button is-danger is-medium" id="btnNo">
❌ Non posso venire
</button>

</div>

</div>
</section>

<a href="https://api.whatsapp.com/send?phone=393895233844&text=Ciao%20Asia!%20Confermo%20la%20mia%20presenza%20al%20tuo%2012%C2%B0%20compleanno!"
class="floating-whatsapp"
target="_blank">
<i class="fab fa-whatsapp"></i> Scrivi a Asia
</a>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const festa = new Date("March 16, 2026 18:00:00").getTime();

const countdown = setInterval(function(){

const now = new Date().getTime();
const distanza = festa - now;

const giorni = Math.floor(distanza/(1000*60*60*24));
const ore = Math.floor((distanza%(1000*60*60*24))/(1000*60*60));
const minuti = Math.floor((distanza%(1000*60*60))/(1000*60));
const secondi = Math.floor((distanza%(1000*60))/1000);

document.getElementById("countdown").innerHTML =
"🎂 Mancano " + giorni + "g " + ore + "h " + minuti + "m " + secondi + "s";

if(distanza < 0){
clearInterval(countdown);
document.getElementById("countdown").innerHTML = "🎉 È il giorno della festa!";
}

},1000);

function lanciaCoriandoli(){
confetti({
particleCount:150,
spread:70,
origin:{y:0.6}
});
}

document.getElementById("btnSi").addEventListener("click",function(){
let nome = prompt("Inserisci il tuo nome");
if(!nome) return;
lanciaCoriandoli();
alert("Grazie "+nome+"! Ci vediamo alla festa 🎉");
});

document.getElementById("btnNo").addEventListener("click",function(){
let nome = prompt("Inserisci il tuo nome");
if(!nome) return;
alert("Grazie per aver risposto 👍");
});
</script>

</body>
</html>
